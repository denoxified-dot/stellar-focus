<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Focus</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Full-screen WebGL canvas lives behind everything -->
    <canvas id="scene"></canvas>

    <!-- Study timer overlay UI -->
    <div id="ui">
      <h1 id="title">Stellar Focus</h1>
      <div id="timer">00:00:00</div>
      <div id="controls">
        <button id="start">Start</button>
        <button id="stop" disabled>Stop</button>
      </div>
      <p id="hint">Press Start to begin a focus session.</p>

      <!-- Populated when a session ends and a real exoplanet is discovered. -->
      <div id="discovery" hidden>
        <!-- Real NASA Astronomy Picture of the Day with its real caption. -->
        <figure id="apod" hidden>
          <img id="apod-img" alt="" />
          <figcaption id="apod-caption">
            <span id="apod-title"></span>
            <span id="apod-credit"></span>
            <span id="apod-explanation"></span>
          </figcaption>
        </figure>

        <div id="discovery-body">
          <div id="discovery-label">Exoplanet discovered</div>
          <div id="discovery-name"></div>
          <div id="discovery-stats"></div>
          <p id="discovery-desc"></p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
